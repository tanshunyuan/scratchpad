        // chat thread
        const threadMessageHistory = [
            {
                id: "ljfdslkj",
                role: "user",
                content: "test",
            },
            {
                id: "fldsjfls",
                role: "agent",
                content:
                    "That's interesting. In a real implementation this is where the API response would come in.",
            },
        ];
        const threadChatMessages = document.getElementById(
            "thread-chat-messages",
        );
        threadMessageHistory.forEach((message) => {
            switch (message.role) {
                case "user":
                    const threadChatMessageUser = document.createElement("div");
                    threadChatMessageUser.id = `thread-chat-message-user_${message.id}`;
                    threadChatMessageUser.style =
                        "background-color: lightgray; border-radius: 0.25rem; padding: 0.25rem 0.4rem; align-self: flex-end;";
                    const textNode = document.createTextNode(message.content);
                    threadChatMessageUser.appendChild(textNode);
                    threadChatMessages.appendChild(threadChatMessageUser);

                    break;
                case "agent":
                    break;
            }
        });

        const threadChatForm = document.getElementById("thread-chat-form");
        threadChatForm.addEventListener("submit", async function (event) {
            event.preventDefault();
            const continueThreadTextarea =
                threadChatForm.elements["continue-thread-textarea"];
            const threadMessageId = `msg_${self.crypto.randomUUID()}`;
            threadMessageHistory.push({
                id: threadMessageId,
                role: "user",
                content: continueThreadTextarea.textContent,
            });
            threadMessageHistory.push({
                id: threadMessageId,
                role: "agent",
                content:
                    "That's interesting. In a real implementation this is where the API response would come in.",
            });
        });
