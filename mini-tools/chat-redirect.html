<!doctype html>
<html lang="en">
    <head>
        <title>Page Title</title>

        <style>
            * {
                margin: 0;
                padding: 0;
            }
            body {
                font-family: monospace;
                margin: 1rem;
            }
        </style>
    </head>
    <body>
        <div
            id="initial-chat-container"
            style="
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            "
        >
            <form
                id="initial-chat-form"
                style="
                    width: 60%;
                    display: flex;
                    flex-direction: column;
                    gap: 0.5rem;
                "
            >
                <h1 style="text-align: center">What's on your mind?</h1>
                <textarea
                    style="resize: none; padding: 8px"
                    id="initial-chat-textarea"
                    rows="4"
                    cols="10"
                    placeholder="Type a message..."
                ></textarea>
                <button
                    type="submit"
                    id="initial-start-thread-btn"
                    style="
                        padding-inline: 0.5rem;
                        padding-block: 0.5rem;
                        width: max-content;
                        align-self: self-end;
                    "
                >
                    Start thread
                </button>
            </form>
        </div>

        <div
            id="thread-chat-container"
            style="height: 100vh; margin-inline: 10rem; display: none"
        >
            <div
                id="thread-chat-messages"
                style="
                    display: flex;
                    flex-direction: column;
                    gap: 0.5rem;
                    margin-bottom: 1rem;
                "
            ></div>
            <form id="thread-chat-form" style="display: flex; gap: 0.5rem">
                <textarea
                    id="continue-thread-textarea"
                    placeholder="Continue the thread..."
                    style="resize: none; padding: 0.25rem; width: 100%"
                ></textarea>
                <button
                    style="padding-inline: 0.5rem"
                    id="send-btn"
                    type="submit"
                >
                    Send
                </button>
            </form>
        </div>
    </body>

    <script>
        const initialChatContainer = document.getElementById(
            "initial-chat-container",
        );
        const initialChatForm = document.getElementById("initial-chat-form");
        const initialChatTextarea = document.getElementById(
            "initial-chat-textarea",
        );
        const initialStartThreadBtn = document.getElementById(
            "initial-start-thread-btn",
        );

        const threadChatContainer = document.getElementById(
            "thread-chat-container",
        );

        function initialChatFormControlState(state) {
            switch (state) {
                case "loading": {
                    initialChatTextarea.disabled = true;
                    initialStartThreadBtn.textContent = "loading...";
                    initialStartThreadBtn.disabled = true;
                    break;
                }
                case "done":
                    initialChatTextarea.disabled = false;
                    initialChatTextarea.value = "";
                    initialStartThreadBtn.textContent = "Submit";
                    initialStartThreadBtn.disabled = false;
                    break;
            }
        }
        async function handleInitialChatSubmission() {
            initialChatFormControlState("loading");

            await new Promise((resolve) => {
                setTimeout(() => {
                    initialChatContainer.setAttribute("style", "display: none");
                    threadChatContainer.setAttribute("style", "display: block");
                    threadChatContainer.insertAdjacentHTML(
                        "afterbegin",
                        `<p>thread: ${self.crypto.randomUUID()}</p>`,
                    );
                    renderThreadMessageHistory({
                        id: `msg_${self.crypto.randomUUID()}`,
                        role: "user",
                        content: initialChatTextarea.value,
                    });
                    // resolve informs the promise it's done
                    resolve();
                }, 1000);
            });
            initialChatFormControlState("done");
        }

        /**@todo naive implementation */
        let keydownHistory = [];
        initialChatTextarea.addEventListener("keydown", async function (event) {
            keydownHistory.push(event.keyCode);
            const enterKeyCode = 13;
            const metaKeyCode = 224;
            const lastTwoKeydown = keydownHistory.slice(-2);
            if (
                lastTwoKeydown[0] === metaKeyCode &&
                lastTwoKeydown[1] === enterKeyCode
            ) {
                await handleInitialChatSubmission();
                keydownHistory = [];
            }
        });

        initialChatForm.addEventListener("submit", async function (event) {
            event.preventDefault();
            await handleInitialChatSubmission();
        });

        // chat thread
        const threadChatMessages = document.getElementById(
            "thread-chat-messages",
        );
        console.log(threadChatContainer);
        const observer = new MutationObserver(async function (
            mutationList,
            observer,
        ) {
            for (const mutation of mutationList) {
                if ((mutation.attributeName = "style")) {
                    if (threadChatContainer.style.display === "block") {
                        const threadChatMessages = document.getElementById(
                            "thread-chat-messages",
                        );
                        const threadChatMessageAgentLoader =
                            renderThreadChatMessageAgentLoader();

                        threadChatMessages.appendChild(
                            threadChatMessageAgentLoader,
                        );

                        await new Promise((resolve) => {
                            setTimeout(resolve, 500);
                        });
                        threadChatMessageAgentLoader.remove();
                        const threadMessageId = `msg_${self.crypto.randomUUID()}`;
                        await renderThreadMessageHistory({
                            id: threadMessageId,
                            role: "agent",
                            content:
                                "That's interesting. In a real implementation this is where the API response would come in.",
                        });
                    }
                }
            }
        });
        observer.observe(threadChatContainer, { attributes: true });

        /**
         * @params threadMessageHistory
         * @example
         *
         * [
         *   {
         *       id: "ljfdslkj",
         *       role: "user",
         *       content: "test",
         *   },
         *   {
         *       id: "fldsjfls",
         *       role: "agent",
         *       content:
         *           "That's interesting. In a real implementation this is where the API response would come in.",
         *   },
         * ];
         */
        function renderThreadChatMessageAgentLoader() {
            const container = document.createElement("div");
            container.setAttribute("id", "thread-chat-message-loader");
            container.setAttribute(
                "style",
                "background-color: whitesmoke; border: 1px solid lightgray; border-radius: 0.25rem; padding: 0.25rem 0.4rem; width: min-content; ",
            );
            container.innerHTML = `<p>...</p>`;
            return container;
        }
        const renderThreadMessageHistory = async (message) => {
            console.log("renderThreadMessage ==> ", {
                role: message.role,
                content: message.content,
            });
            switch (message.role) {
                case "user": {
                    const threadChatMessageUserContainer =
                        document.createElement("div");
                    threadChatMessageUserContainer.id = `thread-chat-message-user_${message.id}`;
                    threadChatMessageUserContainer.style =
                        "background-color: lightgray; border-radius: 0.25rem; padding: 0.25rem 0.4rem; align-self: flex-end;";
                    const textNode = document.createTextNode(message.content);
                    const threadChatMessageUserParagraph =
                        document.createElement("p");
                    threadChatMessageUserParagraph.appendChild(textNode);
                    threadChatMessageUserContainer.appendChild(
                        threadChatMessageUserParagraph,
                    );
                    threadChatMessages.appendChild(
                        threadChatMessageUserContainer,
                    );

                    break;
                }
                case "agent": {
                    const threadChatMessageAgentContainer =
                        document.createElement("div");
                    threadChatMessageAgentContainer.id = `thread-chat-message-agent_${message.id}`;
                    threadChatMessageAgentContainer.style =
                        "background-color: whitesmoke; border: 1px solid lightgray; border-radius: 0.25rem; padding: 0.25rem 0.4rem;";
                    const chunks = message.content.split(" ");
                    let textNode = document.createTextNode("");
                    const threadChatMessageAgentParagraph =
                        document.createElement("p");
                    threadChatMessageAgentParagraph.appendChild(textNode);
                    threadChatMessageAgentContainer.appendChild(
                        threadChatMessageAgentParagraph,
                    );

                    threadChatMessages.appendChild(
                        threadChatMessageAgentContainer,
                    );
                    for (const chunk of chunks) {
                        await new Promise((resolve) => {
                            setTimeout(() => {
                                textNode.textContent += `${chunk} `;
                                resolve();
                            }, 50);
                        });
                    }

                    break;
                }
            }
        };

        const threadChatForm = document.getElementById("thread-chat-form");
        const continueThreadTextarea = document.getElementById(
            "continue-thread-textarea",
        );
        async function handleThreadChatSubmission(event) {
            console.log("handleThreadChatSubmission");
            event.preventDefault();
            const threadMessageHistory = [];
            const sendBtn = document.getElementById("send-btn");
            const threadMessageId = `msg_${self.crypto.randomUUID()}`;
            sendBtn.disabled = true;
            continueThreadTextarea.disabled = true;
            await renderThreadMessageHistory({
                id: threadMessageId,
                role: "user",
                content: continueThreadTextarea.value,
            });
            await new Promise((resolve) => {
                setTimeout(resolve, 500);
            });
            const threadChatMessages = document.getElementById(
                "thread-chat-messages",
            );
            const threadChatMessageAgentLoader =
                renderThreadChatMessageAgentLoader();

            threadChatMessages.appendChild(threadChatMessageAgentLoader);

            await new Promise((resolve) => {
                setTimeout(resolve, 500);
            });
            threadChatMessageAgentLoader.remove();
            await renderThreadMessageHistory({
                id: threadMessageId,
                role: "agent",
                content:
                    "That's interesting. In a real implementation this is where the API response would come in.",
            });
            continueThreadTextarea.value = "";
            continueThreadTextarea.disabled = false;
            sendBtn.disabled = false;
        }

        threadChatForm.addEventListener("submit", async function (event) {
            await handleThreadChatSubmission(event);
        });

        continueThreadTextarea.addEventListener(
            "keydown",
            async function (event) {
                const enterKeyCode = 13;
                if (event.keyCode === enterKeyCode) {
                    await handleThreadChatSubmission(event);
                }
            },
        );
    </script>
</html>
